version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install
  build:
    commands:
      - echo Build started
  post_build:
    commands:
      - aws ssm send-command --instance-ids "i-018af5df58c6dc91c" --document-name "AWS-RunShellScript" --parameters "{\"commands\":[\"bash /tmp/deploy.sh\"]}" --region "us-east-1"
artifacts:
  files:
    - "**/*"